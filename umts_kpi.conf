# ================================================================
#  Logstash Pipeline — UMTS KPI Analytics
#
#  Sources :
#    - Port 5044 : Filebeat → CSV/JSONL déposés dans data/incoming/
#
#  Destination :
#    - Elasticsearch → index umts-kpi-YYYY.MM.dd
#
#  Ce pipeline gère :
#    • parsing CSV brut (séparateur ;)
#    • multi-valeurs (ex: "-68.1, -71.9") → champs scalaires
#    • classification qualité 3GPP (rscp_class, quality_score)
#    • flag anomalie
#    • passthrough JSON enrichi (sortie ingest_pipeline.py)
# ================================================================

input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {

  # ── Cas 1 : JSON enrichi (sorti de ingest_pipeline.py via Filebeat) ──
  # Les fichiers .jsonl sont déjà parsés, on ne touche qu'au timestamp
  if [fields][data_type] == "json_enriched" {

    # @timestamp déjà positionné si présent dans le JSON
    if ![@timestamp] or [@timestamp] == "" {
      mutate {
        add_field => { "[@metadata][ts_fallback]" => "true" }
      }
    }

    mutate {
      remove_field => ["log", "input", "agent", "ecs", "tags", "fields"]
    }

    mutate {
      add_field => { "pipeline" => "jsonl_enriched" }
    }
  }

  # ── Cas 2 : CSV brut (data.csv original via Filebeat) ────────────────
  else if [fields][data_type] == "csv_raw" {

    # Parsing CSV ; séparateur point-virgule
    csv {
      separator      => ";"
      quote_char     => "\""
      columns        => [
        "time_raw",
        "band",
        "channel_raw",
        "sc_active_raw",
        "rscp_active_raw",
        "ecno_active_raw",
        "rscp_detected_raw",
        "sc_detected_raw"
      ]
      skip_empty_columns => true
    }

    # Ignorer la ligne d'en-tête si répétée
    if [time_raw] == "Time" or [time_raw] =~ /^\s*$/ {
      drop {}
    }

    # Ignorer les lignes sans RSCP (données invalides)
    if !([rscp_active_raw]) or [rscp_active_raw] =~ /^\s*$/ {
      drop {}
    }

    # ── Parsing timestamp ─────────────────────────────────────
    if [time_raw] and [time_raw] !~ /^\s*$/ {
      date {
        match => [
          "time_raw",
          "dd/MM/yyyy HH:mm:ss",
          "dd/MM/yyyy HH:mm:ss.SSS",
          "yyyy-MM-dd HH:mm:ss",
          "yyyy-MM-dd'T'HH:mm:ss",
          "dd-MM-yyyy HH:mm:ss",
          "MM/dd/yyyy HH:mm:ss",
          "ISO8601"
        ]
        target         => "@timestamp"
        timezone       => "Africa/Tunis"
        tag_on_failure => ["_date_parse_failure"]
      }
    }

    # ── Extraction multi-valeurs numériques ───────────────────
    # Ruby inline : parse "val1, val2, ..." → champs scalaires + agrégats
    ruby {
      code => '
        def safe_floats(raw)
          return [] if raw.nil? || raw.to_s.strip.empty?
          raw.to_s.split(",").map { |p|
            begin; Float(p.strip); rescue; nil; end
          }.compact
        end

        def safe_ints(raw)
          return [] if raw.nil? || raw.to_s.strip.empty?
          raw.to_s.split(",").map { |p|
            begin; Integer(p.strip); rescue; nil; end
          }.compact
        end

        # ── RSCP actif ──
        ra = safe_floats(event.get("rscp_active_raw"))
        unless ra.empty?
          event.set("rscp_active_1",    ra[0].round(2))
          event.set("rscp_active_2",    ra[1].round(2)) if ra.length >= 2
          event.set("rscp_active_mean", (ra.sum / ra.length.to_f).round(2))
          event.set("rscp_active_max",  ra.max.round(2))
          event.set("rscp_active_min",  ra.min.round(2))
          event.set("rscp_active_std",  ra.length > 1 ?
            Math.sqrt(ra.map{|x|(x-(ra.sum/ra.length.to_f))**2}.sum / ra.length.to_f).round(2) : 0.0)
        end
        event.set("n_cells_active", ra.length)

        # ── Ec/N0 actif ──
        ea = safe_floats(event.get("ecno_active_raw"))
        unless ea.empty?
          event.set("ecno_active_1",    ea[0].round(2))
          event.set("ecno_active_mean", (ea.sum / ea.length.to_f).round(2))
          event.set("ecno_active_max",  ea.max.round(2))
          event.set("ecno_active_min",  ea.min.round(2))
        end

        # ── RSCP détecté ──
        rd = safe_floats(event.get("rscp_detected_raw"))
        unless rd.empty?
          event.set("rscp_detected_1",    rd[0].round(2))
          event.set("rscp_detected_mean", (rd.sum / rd.length.to_f).round(2))
          event.set("rscp_detected_max",  rd.max.round(2))
        end
        event.set("n_cells_detected", rd.length)

        # ── Channel ──
        ch = safe_ints(event.get("channel_raw"))
        event.set("channel_1", ch[0]) unless ch.empty?

        # ── Scrambling code actif ──
        sc = safe_ints(event.get("sc_active_raw"))
        event.set("sc_active_1", sc[0]) unless sc.empty?
      '
      tag_on_exception => ["_ruby_exception"]
    }

    # ── Classification qualité RSCP (seuils 3GPP TS 25.133) ──
    if [rscp_active_1] {
      ruby {
        code => '
          rscp  = event.get("rscp_active_1").to_f
          ecno  = event.get("ecno_active_1")
          ecno_f = ecno ? ecno.to_f : nil

          # Classe texte
          klass = if rscp >= -75 then "excellent"
                 elsif rscp >= -85 then "good"
                 elsif rscp >= -95 then "fair"
                 elsif rscp >= -105 then "poor"
                 else "very_poor"
                 end
          event.set("rscp_class", klass)

          # Score 0-100 linéaire
          score = [[(rscp + 120) * 2, 0].max, 100].min
          event.set("quality_score", score.round(1))

          # Anomalie : RSCP trop bas OU EcN0 trop bas
          anomaly = rscp < -95 || (!ecno_f.nil? && ecno_f < -12.0)
          event.set("is_anomaly",   anomaly)
          event.set("anomaly_flag", anomaly ? 1 : 0)

          # Prédiction règle métier (fallback si pas de modèle ML)
          if !event.get("pred_class")
            pred = rscp >= -85 ? 1 : 0
            event.set("pred_class",  pred)
            event.set("pred_label",  pred == 1 ? "good" : "poor")
            event.set("pred_proba",  pred == 1 ? 0.75 : 0.25)
            event.set("pred_method", "rule_based")
          end
        '
        tag_on_exception => ["_ruby_quality_exception"]
      }
    }

    # ── Normalisation band ─────────────────────────────────────
    if [band] and [band] !~ /^\s*$/ {
      mutate {
        strip     => ["band"]
        uppercase => ["band"]
      }
    }

    # ── Nettoyage champs intermédiaires ────────────────────────
    mutate {
      remove_field => [
        "rscp_active_raw", "ecno_active_raw",
        "rscp_detected_raw", "sc_active_raw",
        "sc_detected_raw", "channel_raw",
        "time_raw", "message",
        "log", "input", "agent", "ecs", "tags", "fields"
      ]
    }

    mutate {
      add_field => { "pipeline" => "csv_raw" }
    }
  }

  # ── Métadonnées communes (tous types) ────────────────────────
  mutate {
    add_field => {
      "data_source" => "umts_kpi"
      "project"     => "pfe_umts_monitoring"
    }
  }

}

output {
  # Index quotidien → compatible avec Data View umts-kpi-*
  elasticsearch {
    hosts              => ["http://elasticsearch:9200"]
    index              => "umts-kpi-%{+YYYY.MM.dd}"
    action             => "index"
    retry_on_conflict  => 3
    timeout            => "60s"
    socket_timeout     => "60s"
  }

  # Dot par événement pour debug (désactiver en prod)
  stdout {
    codec => dots
  }
}